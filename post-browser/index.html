<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Browser</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>

  <body>
    <header class="header">
      <h1>Post Browser</h1>
    </header>

    <main class="main-content">
      <div class="post-count" id="post-count">Post 1 of 100</div>

      <div class="card">
        <h2 id="post-title">Loading...</h2>
        <p id="post-body"></p>

        <div class="button-group top-buttons">
          <button id="refresh-btn">Refresh</button>
          <button id="comment-btn">Comments</button>
        </div>
      </div>

      <div class="bottom-nav">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
      </div>

      <div id="comments-section" class="comments hidden">
        <div id="comments-list"></div>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 Post Browser</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
