<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Browser</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>

  <body>
    <header class="header">
      <h1>Post Browser</h1>
    </header>

    <main class="main-content">
      <!-- Post Counter -->
      <div class="post-count" id="post-count">Post 1 of 100</div>

      <!-- Card -->
      <div class="card">
        <h2 id="post-title">Loading...</h2>
        <p id="post-body">Please wait...</p>

        <!-- Top Buttons (Refresh / Comments) -->
        <div class="top-buttons-left">
          <button id="refresh-btn">Refresh</button>
          <button id="comment-btn">Comments</button>
        </div>

        <!-- Divider -->
        <hr class="divider" />

        <!-- Bottom Navigation (Prev / Next) -->
        <div class="bottom-nav-line">
          <button id="prev-btn">Previous</button>
          <button id="next-btn">Next</button>
        </div>
      </div>

      <!-- Comments Section -->
      <div id="comments-section" class="comments hidden">
        <h3>Comments</h3>
        <div id="comments-list"></div>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 Post Browser</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
